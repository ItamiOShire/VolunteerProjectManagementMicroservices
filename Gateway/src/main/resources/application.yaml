spring:
  application:
    name: Gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: volunteer-service
          uri: lb://volunteer-service
          predicates:
              - Path=/api/volunteer/**

  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:public-key.pem


eureka:
    client:
        service-url:
          defaultZone: http://localhost:${EUREKA_PORT:8761}/eureka/

server:
  port: ${GATEWAY_PORT:8080}

# Custom variables

security:
  jwt:
    expiration: ${JWT_EXPIRATION_S:900} # 15 minutes
    refresh-expiration: ${JWT_REFRESH_EXPIRATION_S:21600} # 6 hours