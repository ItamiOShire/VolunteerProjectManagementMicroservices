spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webflux:
          # Rule of thumb: more specific routes should be defined first, as the gateway matches routes in order
          # TODO: add rate limiting and retry filters, fix routes (** should be at the the beginning or the end of the path)
          # https://docs.spring.io/spring-cloud-gateway/reference/spring-cloud-gateway-server-webflux/gatewayfilter-factories/retry-factory.html
          routes:
            - id: project-service
              uri: lb://PROJECT-SERVICE
              predicates:
                - Path=/api/organizations/{id}/projects,/api/volunteers/{id}/projects,/api/projects/**,

            - id: task-service
              uri: lb://TASK-SERVICE
              predicates:
                - Path=/api/projects/{id}/tasks,/api/volunteers/{id}/tasks/**,/api/volunteers/{volunteerId}/projects/{projectId}/**,/api/tasks/**

            - id: volunteer-service
              uri: lb://VOLUNTEER-SERVICE
              predicates:
                - Path=/api/tasks/{taskId}/projects/{projectId}/volunteers/**,/api/projects/{projectId}/volunteers/**,/api/volunteers/**

            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/auth/**

            - id: organization-service
              uri: lb://ORGANIZATION-SERVICE
              predicates:
                - Path=/api/organizations/**

          discovery:
            locator:
              enabled: true
          httpclient:
            wiretap: true # Enable HTTP traffic logging for debugging purposes (optional, can be removed in production)
          httpserver:
            wiretap: true


  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:public-key.pem


eureka:
    client:
        service-url:
          defaultZone: http://localhost:${EUREKA_PORT:8761}/eureka/

server:
  port: ${GATEWAY_PORT:8080}

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    reactor.netty: INFO
    org.springframework.cloud.gateway.filter: DEBUG
    org.springframework.cloud.gateway.handler: DEBUG
    # Enable request/response logging
    org.springframework.webflux.handler.AbstractHandlerMapping: TRACE

# Custom variables

security:
  jwt:
    expiration: ${JWT_EXPIRATION_S:900} # 15 minutes
    refresh-expiration: ${JWT_REFRESH_EXPIRATION_S:21600} # 6 hours