spring:
  application:
    name: gateway

  cloud:
    gateway:
      # Rule of thumb: more specific routes should be defined first, as the gateway matches routes in order
      # TODO: add rate limiting and retry filters
      # https://docs.spring.io/spring-cloud-gateway/reference/spring-cloud-gateway-server-webflux/gatewayfilter-factories/retry-factory.html
      routes:
        - id: project-service
        - uri: lb://project-service
        - predicates:
        - Path=/api/projects/**, /api/organizations/**/projects, /api/volunteers/**/projects

        - id: task-service
        - uri: lb://task-service
        - predicates:
        - Path=/api/tasks/**, /api/projects/**/tasks, /api/volunteers/**/tasks, /api/volunteers/**/tasks/suggestions

        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: volunteer-service
          uri: lb://volunteer-service
          predicates:
              - Path=/api/volunteers/**

        - id: organization-service
          uri: lb://organization-service
          predicates:
              - Path=/api/organizations/**


  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:public-key.pem


eureka:
    client:
        service-url:
          defaultZone: http://localhost:${EUREKA_PORT:8761}/eureka/

server:
  port: ${GATEWAY_PORT:8080}

# Custom variables

security:
  jwt:
    expiration: ${JWT_EXPIRATION_S:900} # 15 minutes
    refresh-expiration: ${JWT_REFRESH_EXPIRATION_S:21600} # 6 hours