databaseChangeLog:
  - changeSet:
      id: 08-craete-fixed-volunteer-table
      author: Adam
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            columns:
              - column:
                  constraints:
                    nullable: false
                    unique: true
                    primaryKey: true
                    primaryKeyName: pk_volunteer
                  name: user_id
                  type: INT
              - column:
                  constraints:
                    nullable: false
                  name: first_name
                  type: VARCHAR(25)
              - column:
                  constraints:
                    nullable: false
                  name: last_name
                  type: VARCHAR(50)
              - column:
                  constraints:
                    nullable: false
                  name: date_of_birth
                  type: DATE
              - column:
                  constraints:
                    nullable: false
                  name: phone_number
                  type: VARCHAR(12)
              - column:
                  name: contact_email
                  type: VARCHAR(400)
                  constraints:
                    nullable: false
            tableName: volunteer

