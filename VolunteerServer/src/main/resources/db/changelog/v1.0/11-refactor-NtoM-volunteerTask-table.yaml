databaseChangeLog:
  - changeSet:
      id: 11.1-drop-volunteer_task-table
      author: Adam
      changes:
        - dropTable:
            tableName: volunteer_task
            cascadeConstraints: true
  - changeSet:
      id: 11.2-create-volunteer_task-table
      author: Adam
      changes:
        - createTable:
            tableName: volunteer_task
            columns:
              - column:
                  name: volunteer_user_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: task_id
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: project_id
                  type: INT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: volunteer_task
            columnNames: volunteer_user_id, task_id, project_id
            constraintName: pk_volunteer_task
        - addForeignKeyConstraint:
            baseColumnNames: volunteer_user_id
            baseTableName: volunteer_task
            constraintName: fk_volunteer_task_on_volunteer
            referencedColumnNames: user_id
            referencedTableName: volunteer