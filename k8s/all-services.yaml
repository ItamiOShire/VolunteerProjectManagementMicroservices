# Apply with:
#   kubectl apply -f k8s/all-services.yaml
#
# Images referenced below are built from the Dockerfiles added to each service.
# Adjust the image tags if you publish them to a registry.

apiVersion: v1
kind: Namespace
metadata:
  name: vpm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: vpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: vpm/authentication-server:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: PORT_AUTH_SERVICE
              value: "8081"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://auth-db:5432/Users
            - name: SPRING_DATASOURCE_USERNAME
              value: vpm-dev
            - name: SPRING_DATASOURCE_PASSWORD
              value: password
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: http://eureka:8761/eureka/
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: vpm
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
  type: ClusterIP
---
