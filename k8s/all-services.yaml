            - name: SPRING_DATASOURCE_USERNAME
              value: vpm-dev
            - name: SPRING_DATASOURCE_PASSWORD
              value: password
            - name: RABBITMQ_HOST
              value: 172.21.0.1
            - name: RABBITMQ_PORT
              value: "5672"
            - name: RABBITMQ_USERNAME
              value: admin
            - name: RABBITMQ_PASSWORD
              value: password
            - name: SERVICES_AUTH_SERVICE_URL
              value: auth-service:8081
          startupProbe:
