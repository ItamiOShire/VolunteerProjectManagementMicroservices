# Apply with:
#   kubectl apply -f k8s/all-services.yaml
#
# Images referenced below are built from the Dockerfiles added to each service.
# Adjust the image tags if you publish them to a registry.

apiVersion: v1
kind: Namespace
metadata:
  name: vpm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: vpm
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: vpm/authentication-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: PORT_AUTH_SERVICE
              value: "8081"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://172.21.0.1:5551/Users
            - name: SPRING_DATASOURCE_USERNAME
              value: vpm-dev
            - name: SPRING_DATASOURCE_PASSWORD
              value: password
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              port: 8081
              path: /actuator/health
          livenessProbe:
            httpGet:
              port: 8081
              path: /actuator/health
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: vpm
spec:
  selector:
    app: auth-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
  type: ClusterIP
---
