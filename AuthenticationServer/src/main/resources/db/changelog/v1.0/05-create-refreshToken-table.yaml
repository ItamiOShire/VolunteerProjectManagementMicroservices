databaseChangeLog:
  - changeSet:
      id: create_refresh_token_table
      author: adam.n
      changes:
        - createTable:
            tableName: refresh_token
            columns:
              - column:
                  name: id
                  type: serial
                  autoIncrement: true
                  constraints:
                      primaryKey: true
                      nullable: false
              - column:
                  name: token
                  type: varchar(500)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expiry_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: revoked
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: serial
                  constraints:
                    nullable: false
                    foreignKeyName: fk_refresh_token_users
                    references: users(id)