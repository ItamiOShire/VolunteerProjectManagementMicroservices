spring:
  application:
    name: auth-service

# oAuth2 security

  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:certs/public-key.pem

  # JPA and Hibernate configuration

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

# Database configuration

  datasource:
    url: jdbc:postgresql://auth-db:${PORT_DATABASE_AUTH:5551}/Users
    username: vpm-dev
    password: ${POSTGRES_PASSWORD:password}

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

server:
  port: ${PORT_AUTH_SERVICE:8081}

# Custom variables

security:
  jwt:
    expiration: ${JWT_EXPIRATION_S:900} # 15 minutes
    refresh-expiration: ${JWT_REFRESH_EXPIRATION_S:21600} # 6 hours
    private-key-path: ${PRIVATE_KEY_PATH:classpath:certs/private-key.pem}
