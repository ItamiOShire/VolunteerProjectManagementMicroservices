databaseChangeLog:
  - changeSet:
      id: create-organization-table
      author: adam.n
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_organization
                  name: id
                  type: SERIAL
              - column:
                  constraints:
                    nullable: false
                  name: user_id
                  type: INT
              - column:
                  constraints:
                    nullable: false
                  name: organization_name
                  type: VARCHAR(50)
              - column:
                  constraints:
                    nullable: false
                  name: krs_number
                  type: VARCHAR(10)
              - column:
                  constraints:
                    nullable: false
                  name: street
                  type: VARCHAR(40)
              - column:
                  name: apartment_number
                  type: VARCHAR(10)
              - column:
                  constraints:
                    nullable: false
                  name: town
                  type: VARCHAR(40)
              - column:
                  constraints:
                    nullable: false
                  name: zip_code
                  type: VARCHAR(6)
              - column:
                  constraints:
                    nullable: false
                  name: owner_first_name
                  type: VARCHAR(25)
              - column:
                  constraints:
                    nullable: false
                  name: owner_last_name
                  type: VARCHAR(50)
              - column:
                  constraints:
                    nullable: false
                  name: phone_number
                  type: VARCHAR(30)
            tableName: organization

